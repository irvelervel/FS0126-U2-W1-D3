<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Navbar</title>
    <link rel="stylesheet" href="./css/flex-navbar.css" />
  </head>
  <body>
    <header>
      <!-- l'elemento header sarà il nostro contenitore
         flessibile, che disporrà i suoi items (nav e form)
         dapprima in verticale (mobile), e successivamente
         in orizzontale (notebook/desktop) -->
      <nav>
        <ul>
          <li>
            <a href="#">Logo</a>
          </li>
          <li>
            <a href="#">Home</a>
          </li>
          <li>
            <a href="#">Products</a>
          </li>
          <li>
            <a href="#">Services</a>
          </li>
        </ul>
      </nav>
      <form>
        <input type="search" placeholder="Search" required />
        <button>Go</button>
      </form>
    </header>
  </body>
</html>
